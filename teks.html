<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opang Darmawan</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Righteous', cursive;
            user-select: none;
            -webkit-user-select: none; /* Mencegah ter-block biru di Safari/iOS */
        }

        .name-container {
            font-size: clamp(2rem, 8vw, 6rem);
            text-align: center;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2px;
            color: #000000;
        }

        .letter {
            cursor: pointer;
            transition: transform 0.1s ease, color 0.2s ease;
            display: inline-block;
        }

        /* Class aktif saat huruf ditekan atau dilewati */
        .letter.active {
            transform: translateY(-8px) scale(1.1);
            color: #FF007F;
            text-shadow: 3px 3px 0px #000;
        }
    </style>
</head>
<body>

    <div class="name-container" id="nameText"></div>

    <script>
        // Tangga nada yang lebih tinggi (Suara Marimba/Bell agar lebih nyaring)
        const notes = [
            261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 
            493.88, 523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77
        ];
        
        let audioCtx = null;

        function playSound(freq) {
            // Memaksa inisiasi audio pada saat klik/sentuh
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.type = 'sine'; // Diubah ke sine wave untuk suara yang bulat dan bersih
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

            // Efek suara memudar cepat (seperti lonceng/marimba)
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        const nameString = "Opang Darmawan";
        const nameContainer = document.getElementById('nameText');
        
        nameString.split('').forEach((char, index) => {
            if (char === ' ') {
                const space = document.createElement('span');
                space.style.width = '20px';
                nameContainer.appendChild(space);
                return;
            }
            const span = document.createElement('span');
            span.className = 'letter';
            span.innerText = char;
            
            const noteFreq = notes[index % notes.length];
            
            // Fungsi ketika interaksi terjadi
            const triggerAction = (e) => {
                if(e) e.preventDefault(); // Mencegah klik ganda di layar sentuh
                playSound(noteFreq);
                span.classList.add('active');
                setTimeout(() => span.classList.remove('active'), 200);
            };

            // Event untuk klik mouse dan sentuhan layar (Paling stabil di iframe)
            span.addEventListener('mousedown', triggerAction);
            span.addEventListener('touchstart', triggerAction, {passive: false});

            // Event saat kursor digeser (hover). Hanya bunyi JIKA audio sudah diizinkan oleh klik pertama.
            span.addEventListener('mouseenter', () => {
                if (audioCtx && audioCtx.state === 'running') {
                    playSound(noteFreq);
                    span.classList.add('active');
                    setTimeout(() => span.classList.remove('active'), 200);
                }
            });
            
            nameContainer.appendChild(span);
        });
    </script>
</body>
</html>
