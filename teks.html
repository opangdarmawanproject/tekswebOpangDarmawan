<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teks Interaktif Opang</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column; /* Mengubah arah agar teks hint ada di bawah */
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Righteous', cursive;
            user-select: none; /* Mencegah teks ter-block biru saat diklik cepat */
        }

        .name-container {
            font-size: clamp(2rem, 8vw, 6rem);
            text-align: center;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2px;
            color: #000000;
        }

        .letter {
            cursor: pointer;
            transition: transform 0.1s ease, color 0.2s ease;
            display: inline-block;
        }

        .letter:hover, .letter:active {
            transform: translateY(-8px) scale(1.1);
            color: #FF007F; /* Warna pink saat diklik/hover */
            text-shadow: 3px 3px 0px #000;
        }

        /* Teks petunjuk kecil */
        .hint {
            font-family: sans-serif;
            font-size: 0.9rem;
            color: #888;
            margin-top: 15px;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

    <div class="name-container" id="nameText"></div>
    <div class="hint" id="hintText">(Klik salah satu huruf untuk mengaktifkan suara)</div>

    <script>
        let audioCtx = null;
        let isAudioUnlocked = false;
        
        // Frekuensi chord gitar (C Major Pentatonic)
        const notes = [
            130.81, 146.83, 164.81, 196.00, 220.00, 
            261.63, 293.66, 329.63, 392.00, 440.00, 
            523.25, 587.33, 659.25
        ];

        // Fungsi untuk mengizinkan audio berjalan di browser
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            isAudioUnlocked = true;
            // Sembunyikan teks hint setelah audio berhasil aktif
            document.getElementById('hintText').style.opacity = '0'; 
        }

        function playGuitarString(frequency) {
            if (!isAudioUnlocked) return; // Cegah error jika browser belum mengizinkan
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        }

        const nameString = "Opang Darmawan";
        const nameContainer = document.getElementById('nameText');
        
        nameString.split('').forEach((char, index) => {
            if (char === ' ') {
                const space = document.createElement('span');
                space.style.width = '20px';
                nameContainer.appendChild(space);
                return;
            }
            const span = document.createElement('span');
            span.className = 'letter';
            span.innerText = char;
            
            const noteFreq = notes[index % notes.length];
            
            // Event Listener 1: Saat diklik (atau disentuh di HP)
            // Ini akan membuka kunci keamanan browser DAN membunyikan nada
            span.addEventListener('pointerdown', (e) => {
                initAudio();
                playGuitarString(noteFreq);
                
                // Beri efek warna sesaat ketika diklik
                span.style.color = '#FF007F';
                setTimeout(() => span.style.color = '', 200);
            });

            // Event Listener 2: Saat kursor lewat (Hover)
            // Hanya akan berbunyi JIKA sebelumnya pengguna sudah pernah klik minimal 1 kali
            span.addEventListener('mouseenter', () => {
                if (isAudioUnlocked) {
                    playGuitarString(noteFreq);
                }
            });
            
            nameContainer.appendChild(span);
        });
    </script>
</body>
</html>
