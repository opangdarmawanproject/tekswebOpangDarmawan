<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teka-Teki PERMISI</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #252542);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h3 {
            margin-bottom: 20px;
            letter-spacing: 1px;
            color: #a2a2d0;
            text-align: center;
        }

        /* Area untuk huruf yang berhamburan */
        #pool {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
            min-height: 80px;
            padding: 10px;
            width: 80%;
            max-width: 600px;
        }

        /* Area target penyusunan */
        #target-zone {
            display: flex;
            gap: 15px;
            justify-content: center;
            border-bottom: 3px dashed #4e4e7a;
            padding-bottom: 15px;
            min-width: 300px;
            min-height: 70px;
            margin-bottom: 30px;
        }

        /* Gaya Kotak Huruf */
        .letter {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: #fff;
            font-size: 2rem;
            font-weight: bold;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            cursor: grab;
            user-select: none;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .letter:active {
            cursor: grabbing;
            transform: scale(1.1);
        }

        /* Gaya khusus saat sukses menjadi Link */
        .success-link {
            display: none;
            font-size: 2.5rem;
            font-weight: 900;
            color: #00ffcc;
            text-decoration: none;
            letter-spacing: 5px;
            background: rgba(0, 255, 204, 0.1);
            padding: 15px 40px;
            border: 2px solid #00ffcc;
            border-radius: 50px;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.4);
            animation: pulse 1.5s infinite alternate;
            transition: all 0.3s ease;
        }

        .success-link:hover {
            background: #00ffcc;
            color: #1e1e2f;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.8);
            transform: scale(1.05);
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.03); }
        }
    </style>
</head>
<body>

    <h3 id="hint">Susun huruf-huruf di bawah ini menjadi kata yang benar!</h3>

    <div id="pool"></div>

    <div id="target-zone"></div>

    <a id="secret-link" href="https://opangdarmawanproject.github.io/OpangDarmawanPage/" class="success-link">PERMISI</a>

    <script>
        const word = "PERMISI";
        const pool = document.getElementById('pool');
        const targetZone = document.getElementById('target-zone');
        const secretLink = document.getElementById('secret-link');
        const hint = document.getElementById('hint');

        // 1. Acak huruf (Menggunakan algoritma Fisher-Yates)
        let lettersArray = word.split('');
        do {
            for (let i = lettersArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [lettersArray[i], lettersArray[j]] = [lettersArray[j], lettersArray[i]];
            }
        } while (lettersArray.join('') === word); // Pastikan tidak langsung benar saat diacak

        // 2. Tampilkan huruf-huruf di layar
        lettersArray.forEach((char, index) => {
            const letterEl = document.createElement('div');
            letterEl.classList.add('letter');
            letterEl.textContent = char;
            letterEl.id = `letter-${index}`;
            
            // Klik untuk pindah tempat (Lebih ramah Mobile/HP dibanding Drag-Drop)
            letterEl.addEventListener('click', () => {
                if (letterEl.parentNode === pool) {
                    targetZone.appendChild(letterEl);
                } else {
                    pool.appendChild(letterEl);
                }
                checkResult();
            });

            pool.appendChild(letterEl);
        });

        // 3. Fungsi memeriksa susunan huruf
        function checkResult() {
            const currentLetters = Array.from(targetZone.children).map(el => el.textContent);
            const currentWord = currentLetters.join('');

            if (currentWord === word) {
                // Sembunyikan elemen game
                pool.style.display = 'none';
                targetZone.style.display = 'none';
                hint.textContent = "🎉 Kamu Berhasil! Klik kata di bawah untuk masuk:";
                hint.style.color = "#00ffcc";

                // Munculkan link utama
                secretLink.style.display = 'block';
            }
        }
    </script>
</body>
</html>
